<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>Sprayway | Advanced Server Cloner</title>
    <style>
        :root {
            --bg-color: #090611;
            --card-bg: #130c1f;
            --primary: #b05cf1; /* Neon Purple */
            --primary-dim: rgba(176, 92, 241, 0.2);
            --primary-glow: rgba(176, 92, 241, 0.5);
            --text-main: #e2d1f0;
            --text-muted: #8c7a9c;
            --danger: #ff3366;
            --success: #00ffcc;
        }

        /* 
         * CUSTOM CURSORS (Base64 SVG) 
         * Normal İmleç: Keskin mor bir ok.
         * Tıklanabilir (Pointer) İmleç: Hedef (Crosshair) şeklinde neon yuvarlak.
         */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', 'Segoe UI', monospace; 
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="%23b05cf1" stroke="%23ffffff" stroke-width="1" d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.86-4.86a.5.5 0 0 1 .35-.15h6.42c.45 0 .67-.54.35-.85L5.5 3.21z"/><filter id="glow"><feGaussianBlur stdDeviation="1.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></svg>'), auto !important;
        }

        a, button, input, .yt-placeholder {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="%23b05cf1"/><circle cx="12" cy="12" r="10" fill="none" stroke="%23b05cf1" stroke-width="1.5" stroke-dasharray="4 2"/></svg>') 12 12, pointer !important;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            background-image: 
                radial-gradient(circle at 50% 0%, var(--primary-dim) 0%, transparent 50%),
                linear-gradient(rgba(176, 92, 241, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(176, 92, 241, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            overflow: hidden;
        }
        
        .container { 
            width: 100%; 
            max-width: 1050px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            z-index: 1;
        }
        
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glitchPulse {
            0% { box-shadow: 0 0 15px var(--primary-dim); border-color: rgba(176, 92, 241, 0.1); }
            50% { box-shadow: 0 0 35px var(--primary-glow); border-color: rgba(176, 92, 241, 0.6); }
            100% { box-shadow: 0 0 15px var(--primary-dim); border-color: rgba(176, 92, 241, 0.1); }
        }

        .panel { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 35px; 
            border: 1px solid rgba(176, 92, 241, 0.2); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .panel:nth-child(1) { animation-delay: 0.1s; }
        .panel:nth-child(2) { animation-delay: 0.3s; }
        
        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        h2 { 
            color: var(--primary); 
            margin-bottom: 25px; 
            font-weight: 800; 
            font-size: 20px; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--primary-dim);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h2::before {
            content: '/>';
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 11px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 1px;
        }
        
        input { 
            width: 100%; 
            background: #0d0814; 
            border: 1px solid #2d1b42; 
            color: #fff; 
            padding: 15px; 
            border-radius: 6px; 
            outline: none; 
            font-size: 14px;
            font-family: 'Consolas', monospace;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        input:focus { 
            border-color: var(--primary); 
            background: #090611;
            box-shadow: 0 0 20px var(--primary-dim); 
            transform: translateY(-2px);
        }
        
        .warning-box { 
            background: rgba(255, 51, 102, 0.05); 
            border-left: 3px solid var(--danger); 
            padding: 15px; 
            border-radius: 4px; 
            margin-bottom: 25px; 
            font-size: 12px; 
            color: #ff85a1; 
            line-height: 1.6;
            letter-spacing: 0.5px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .warning-box:hover { 
            transform: scale(1.02); 
            background: rgba(255, 51, 102, 0.1);
        }
        
        button { 
            width: 100%; 
            background: transparent; 
            color: var(--primary); 
            border: 1px solid var(--primary); 
            padding: 16px; 
            font-size: 14px; 
            font-weight: 800; 
            border-radius: 6px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        
        button:hover { 
            background: var(--primary); 
            color: var(--bg-color); 
            box-shadow: 0 0 25px var(--primary-glow); 
            transform: translateY(-3px); 
        }
        
        button:active { transform: translateY(1px); }
        
        button:disabled { 
            background: #1a1025; 
            border-color: #2d1b42;
            color: #5c4773; 
            box-shadow: none;
            transform: none;
        }
        
        .terminal { 
            background: #050308; 
            border-radius: 8px; 
            padding: 20px; 
            height: calc(100% - 60px); 
            min-height: 480px; 
            overflow-y: auto; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 12px; 
            border: 1px solid #2d1b42; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
            position: relative;
        }
        
        .terminal::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(176, 92, 241, 0.05) 50%, transparent 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
        
        .terminal::-webkit-scrollbar { width: 4px; }
        .terminal::-webkit-scrollbar-track { background: #050308; }
        .terminal::-webkit-scrollbar-thumb { background: #2d1b42; }
        .terminal::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .log-line { 
            margin-bottom: 8px; 
            line-height: 1.6; 
            animation: fadeInUp 0.2s ease-out forwards; 
            position: relative;
            z-index: 20;
            word-break: break-all;
        }
        .log-info { color: #a37acc; }
        .log-success { color: var(--success); text-shadow: 0 0 8px rgba(0, 255, 204, 0.4); }
        .log-warning { color: #ffd166; }
        .log-error { color: var(--danger); text-shadow: 0 0 8px rgba(255, 51, 102, 0.4); }
        
        .yt-section { margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(176, 92, 241, 0.2); }
        .yt-label { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; }
        .yt-placeholder {
            width: 100%; height: 130px;
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0.4), rgba(0,0,0,0.4) 10px, rgba(19,12,31,0.6) 10px, rgba(19,12,31,0.6) 20px);
            border: 1px solid #2d1b42; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #5c4773; transition: all 0.3s ease;
        }
        .yt-placeholder:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,0,0,0.6); box-shadow: inset 0 0 20px var(--primary-dim); }
        .yt-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.8; }

        @media (max-width: 900px) { 
            .container { grid-template-columns: 1fr; } 
            .terminal { min-height: 350px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- LEFT PANEL: CONTROLS -->
        <div class="panel">
            <h2>SPRAYWAY CLONER</h2>
            
            <div class="warning-box">
                <strong>SEC-WARNING //</strong> Upon completion, the connection token will be permanently purged from the server memory to avoid traces. <b>Strictly</b> use an alternative account (Alt-Token).
            </div>

            <div class="input-group">
                <label>Auth Token (Alt Account)</label>
                <input type="password" id="token" placeholder="ODg... or mfa.XXX..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>Source Server ID (To Copy)</label>
                <input type="text" id="sourceId" placeholder="e.g. 123456789012345678">
            </div>

            <div class="input-group">
                <label>Target Server ID (To Paste)</label>
                <input type="text" id="targetId" placeholder="e.g. 987654321098765432">
            </div>

            <button id="startBtn" onclick="startCloning()">Initialize Cloning</button>

            <!-- YOUTUBE PLACEHOLDER -->
            <div class="yt-section">
                <div class="yt-label">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="color: #b05cf1;"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    Documentation (Video Soon)
                </div>
                <div class="yt-placeholder">
                    <div class="yt-icon">▶</div>
                    <span style="font-size: 11px; font-weight: 700; letter-spacing: 1px;">VIDEO ENCRYPTED</span>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: TERMINAL -->
        <div class="panel">
            <h2>SYSTEM TERMINAL</h2>
            <div class="terminal" id="terminal"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // SYNTH AUDIO ENGINE (No External Assets)
        // Tarayıcının kendi ses kartı gücünü kullanır
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol=0.05) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {} // Tarayıcı engellemesini yoksay
        }

        const SFX = {
            hover: () => playTone(800, 'sine', 0.05, 0.01),
            type: () => playTone(1200, 'square', 0.03, 0.01),
            click: () => playTone(600, 'square', 0.1, 0.03),
            error: () => { playTone(150, 'sawtooth', 0.3, 0.05); setTimeout(()=>playTone(100, 'sawtooth', 0.5, 0.05), 150); },
            success: () => { playTone(400, 'sine', 0.1, 0.03); setTimeout(()=>playTone(800, 'sine', 0.3, 0.03), 100); },
            start: () => { playTone(300, 'triangle', 0.1, 0.04); setTimeout(()=>playTone(600, 'triangle', 0.1, 0.04), 100); setTimeout(()=>playTone(900, 'triangle', 0.4, 0.04), 200); }
        };

        // UI Etkileşimlerine Ses Ekleme
        document.querySelectorAll('button, input, .yt-placeholder').forEach(el => {
            el.addEventListener('mouseenter', SFX.hover);
            if(el.tagName === 'INPUT') el.addEventListener('focus', SFX.click);
        });

        // ==========================================
        // CORE LOGIC & TRANSLATOR
        // ==========================================
        const terminal = document.getElementById('terminal');
        const startBtn = document.getElementById('startBtn');
        const rootPanel = document.querySelector('.panel');

        // Backend'den Türkçe gelse bile Terminal'e İngilizce yazdıran dinamik sözlük
        const dict = {
            "Hesaba giriş yapılıyor...": "Authenticating auth token...",
            "Giriş başarılı:": "Authentication bypass successful:",
            "Hedef sunucu temizleniyor...": "Executing wipe protocol on target...",
            "Hedef sunucu temizlendi.": "Target server wiped clean.",
            "Roller kopyalanıyor...": "Extracting and cloning roles...",
            "Kategoriler kopyalanıyor...": "Extracting and cloning categories...",
            "Kanallar ve izinler kopyalanıyor...": "Cloning channels & overwriting permissions...",
            "Mesajları çekiliyor...": "Fetching encrypted message history...",
            "Kanal oluşturuldu:": "Channel deployed:",
            "Kategori oluşturuldu:": "Category deployed:",
            "Rol kopyalandı:": "Role deployed:",
            "Tüm işlemler başarıyla tamamlandı! İz kalmaması için çıkış yapılıyor...": "Operation 100% complete. Initiating stealth logout...",
            "Güvenli çıkış yapıldı.": "Stealth logout successful. Ghosted.",
            "Kritik Hata:": "CRITICAL EXCEPTION:"
        };

        function translateLog(trText) {
            let enText = trText;
            for (let [tr, en] of Object.entries(dict)) {
                if (enText.includes(tr)) {
                    enText = enText.replace(tr, en);
                }
            }
            return enText;
        }

        function appendLog(message, type, disableTypeSound = false) {
            const translatedMsg = translateLog(message);
            const div = document.createElement('div');
            div.className = `log-line log-${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            div.innerHTML = `<span style="color:var(--text-muted)">[${time}]</span> > ${translatedMsg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
            
            if(!disableTypeSound) SFX.type();
        }

        // Boot Sequence Simulation
        setTimeout(() => appendLog('Booting Sprayway Core v2.0...', 'info', true), 300);
        setTimeout(() => appendLog('Establishing secure SSE connection...', 'info', true), 800);
        setTimeout(() => {
            appendLog('Connection established. Waiting for input parameters.', 'warning', true);
            SFX.success();
        }, 1500);

        // SSE Listener
        const evtSource = new EventSource('/api/stream');
        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            appendLog(data.message, data.type);
            
            if (data.message.includes("Güvenli çıkış yapıldı.")) {
                SFX.success();
                resetButton(true);
            } else if (data.message.includes("Kritik Hata") || data.type === 'error') {
                SFX.error();
                resetButton(false);
            }
        };

        function resetButton(isSuccess) {
            startBtn.disabled = false;
            startBtn.textContent = "Re-Initialize";
            if (isSuccess) {
                rootPanel.style.animation = 'glitchPulse 1.5s infinite';
                setTimeout(() => rootPanel.style.animation = '', 4500);
            }
        }

        async function startCloning() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const token = document.getElementById('token').value.trim();
            const sourceId = document.getElementById('sourceId').value.trim();
            const targetId = document.getElementById('targetId').value.trim();

            if (!token || !sourceId || !targetId) {
                SFX.error();
                appendLog('MISSING PARAMETERS: Fill all required fields to proceed.', 'error');
                return;
            }

            SFX.start();
            startBtn.disabled = true;
            startBtn.textContent = "Executing...";
            startBtn.style.boxShadow = "0 0 20px rgba(176, 92, 241, 0.5)";
            
            terminal.innerHTML = '';
            appendLog('Initiating handshake with backend...', 'info');

            try {
                const response = await fetch('/api/clone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, sourceId, targetId })
                });

                const data = await response.json();
                if (!response.ok) {
                    SFX.error();
                    appendLog(`API DENIED: ${data.error}`, 'error');
                    startBtn.disabled = false;
                    startBtn.textContent = "Initialize Cloning";
                    startBtn.style.boxShadow = "none";
                }
            } catch (error) {
                SFX.error();
                appendLog('CONNECTION LOST: Backend server is offline or unreachable.', 'error');
                startBtn.disabled = false;
                startBtn.textContent = "Initialize Cloning";
                startBtn.style.boxShadow = "none";
            }
        }
    </script>
</body>
</html>
